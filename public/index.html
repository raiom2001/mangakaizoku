<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MangaKaizoku</title>
  <meta name="description" content="Leia seus mangas favoritos — MangaKaizoku 海賊漫画"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#07070d"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Kaizoku"/>
  <script>
    (function(){
      var l=document.createElement('link');
      l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Shippori+Mincho:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap';
      l.media='print';l.onload=function(){this.media='all';};
      document.head.appendChild(l);
    })();
  </script>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar" id="topbar">
  <div class="topbar-inner">

    <a href="#/" class="logo" aria-label="MangaKaizoku">
      <!-- Navio pirata SVG detalhado -->
      <svg class="logo-ship" width="40" height="32" viewBox="0 0 48 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- casco -->
        <path d="M5 22 Q24 30 43 22 L40 27 Q24 35 8 27 Z" fill="var(--red)"/>
        <!-- deck -->
        <rect x="7" y="19" width="34" height="3.5" rx="1" fill="var(--gold)"/>
        <!-- mastro principal -->
        <line x1="24" y1="3" x2="24" y2="20" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round"/>
        <!-- mastro de proa inclinado -->
        <line x1="13" y1="10" x2="10" y2="20" stroke="var(--gold)" stroke-width="1.4" stroke-linecap="round"/>
        <!-- verga horizontal -->
        <line x1="14" y1="9" x2="34" y2="9" stroke="var(--gold)" stroke-width="1.2" stroke-linecap="round"/>
        <!-- vela principal grande -->
        <path d="M24 4 L36 9 L36 18 L24 20 Z" fill="var(--text)" opacity="0.88"/>
        <!-- vela de proa -->
        <path d="M13 10 L22 12 L22 19 L13 20 Z" fill="var(--text)" opacity="0.7"/>
        <!-- vela superior -->
        <path d="M24 4 L32 7 L24 9 Z" fill="var(--text)" opacity="0.6"/>
        <!-- bandeira pirata no topo -->
        <path d="M24 3 L24 6 L29 4.5 Z" fill="var(--red)"/>
        <!-- janelas do casco -->
        <circle cx="16" cy="23" r="1.2" fill="var(--gold)" opacity="0.6"/>
        <circle cx="24" cy="24" r="1.2" fill="var(--gold)" opacity="0.6"/>
        <circle cx="32" cy="23" r="1.2" fill="var(--gold)" opacity="0.6"/>
        <!-- ondas -->
        <path d="M2 28 Q6 26 10 28 Q14 30 18 28 Q22 26 26 28 Q30 30 34 28 Q38 26 44 28" stroke="var(--gold)" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round"/>
        <path d="M4 31 Q8 29 12 31 Q16 33 20 31 Q24 29 28 31 Q32 33 36 31 Q40 29 44 31" stroke="var(--gold)" stroke-width="0.8" fill="none" opacity="0.3" stroke-linecap="round"/>
      </svg>
      <div class="logo-text-wrap">
        <span class="logo-name">Manga<span style="color:var(--red)">Kaizoku</span></span>
        <span class="logo-sub">海賊漫画</span>
      </div>
    </a>

    <nav class="topbar-nav" role="navigation">
      <a href="#/" class="nav-link" data-route="home">Home</a>
      <a href="#/search" class="nav-link" data-route="search">Buscar</a>
      <a href="#/favorites" class="nav-link" data-route="favorites">Favoritos</a>
      <a href="#/history" class="nav-link" data-route="history">Historico</a>
    </nav>

    <div class="topbar-actions">
      <button class="icon-btn" id="themeToggle" aria-label="Alternar tema">
        <svg id="themeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

  </div>
</header>

<!-- MAIN -->
<main class="main-content" id="app">
  <div class="page-loading"><div class="spinner"></div></div>
</main>

<!-- BOTTOMBAR MOBILE -->
<nav class="bottombar" id="bottombar" role="navigation" aria-label="Navegacao principal">

  <a href="#/" class="bottom-link" data-route="home">
    <span class="bottom-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
    </span>
    <span class="bottom-label">Home</span>
  </a>

  <a href="#/search" class="bottom-link" data-route="search">
    <span class="bottom-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <span class="bottom-label">Buscar</span>
  </a>

  <!-- Botao central navio -->
  <a href="#/" class="bottom-link bottom-link--ship" data-route="home" aria-label="Inicio">
    <span class="bottom-ship-btn">
      <svg width="26" height="20" viewBox="0 0 48 36" fill="none">
        <path d="M5 22 Q24 30 43 22 L40 27 Q24 35 8 27 Z" fill="white" opacity="0.95"/>
        <rect x="7" y="19" width="34" height="3" rx="1" fill="white" opacity="0.7"/>
        <line x1="24" y1="3" x2="24" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M24 4 L36 9 L36 18 L24 20 Z" fill="white" opacity="0.85"/>
        <path d="M13 10 L22 12 L22 19 L13 20 Z" fill="white" opacity="0.65"/>
        <path d="M24 3 L24 6 L29 4.5 Z" fill="white"/>
      </svg>
    </span>
  </a>

  <a href="#/favorites" class="bottom-link" data-route="favorites">
    <span class="bottom-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </span>
    <span class="bottom-label">Favoritos</span>
  </a>

  <a href="#/history" class="bottom-link" data-route="history">
    <span class="bottom-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </span>
    <span class="bottom-label">Historico</span>
  </a>

</nav>

<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<script src="assets/js/store.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/router.js"></script>
<script src="assets/js/app.js"></script>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
