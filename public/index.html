<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaKaizoku</title>
  <meta name="description" content="Leia seus mangas favoritos — MangaKaizoku" />

  <!-- Preload critico apenas -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fontes carregam de forma NAO bloqueante (print -> all) -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- Carrega fontes assincronamente para nao bloquear render -->
  <script>
    (function() {
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Shippori+Mincho:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap';
      link.media = 'print';
      link.onload = function() { this.media = 'all'; };
      document.head.appendChild(link);
    })();
  </script>
</head>
<body>
  <header class="topbar" id="topbar">
    <div class="topbar-inner">
      <a href="#/" class="logo" aria-label="MangaKaizoku Home">
        <svg class="logo-mark" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="var(--color-gold)" stroke-width="1.5" fill="none"/>
          <path d="M14 6L22 10V18L14 22L6 18V10L14 6Z" fill="var(--color-primary)" opacity="0.3"/>
          <path d="M10 14H18M14 10V18" stroke="var(--color-gold)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Manga<span class="logo-accent">Kaizoku</span></span>
      </a>
      <nav class="topbar-nav">
        <a href="#/" class="nav-link" data-route="home">Home</a>
        <a href="#/search" class="nav-link" data-route="search">Buscar</a>
        <a href="#/favorites" class="nav-link" data-route="favorites">Favoritos</a>
        <a href="#/history" class="nav-link" data-route="history">Historico</a>
      </nav>
      <div class="topbar-actions">
        <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Alternar tema">
          <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content" id="app">
    <div class="page-loading"><div class="spinner"></div></div>
  </main>

  <nav class="bottombar" id="bottombar">
    <a href="#/" class="bottom-link" data-route="home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span class="bottom-label">Home</span>
    </a>
    <a href="#/search" class="bottom-link" data-route="search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="bottom-label">Buscar</span>
    </a>
    <a href="#/favorites" class="bottom-link" data-route="favorites">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="bottom-label">Favoritos</span>
    </a>
    <a href="#/history" class="bottom-link" data-route="history">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span class="bottom-label">Historico</span>
    </a>
  </nav>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
