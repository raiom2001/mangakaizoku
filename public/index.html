    }, 2200);

</script>
  
<script>
// PWA Install prompt
let _deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  const btn = document.getElementById('installBtn');
  if (btn) { btn.style.display = 'flex'; }
});

window.addEventListener('appinstalled', () => {
  _deferredPrompt = null;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'none';
});

function triggerInstall() {
  if (_deferredPrompt) {
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(result => {
      _deferredPrompt = null;
      const btn = document.getElementById('installBtn');
      if (result.outcome === 'accepted' && btn) btn.style.display = 'none';
    });
  } else {
    // iOS / outros
    const msg = navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad')
      ? 'Para instalar no iOS:\n1. Toque no icone de Compartilhar\n2. Selecione "Adicionar a Tela de Inicio"'
      : 'Para instalar:\nNo Chrome: toque nos 3 pontos > "Adicionar a tela inicial"';
    alert(msg);
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('installBtn')?.addEventListener('click', triggerInstall);
});
</script>
